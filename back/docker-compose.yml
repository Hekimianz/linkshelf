services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: linkshelf
      POSTGRES_USER: linkshelf
      POSTGRES_PASSWORD: linkshelf
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'

volumes:
  postgres_data:
